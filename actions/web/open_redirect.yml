name: open_redirect
category: web
description: Open redirect exploitation
preconditions:
- service.port==80
parameters:
  target_ip: from_engagement.target_ip
command_template: curl -s '{target_url}/redirect?url=http://attacker.com'
parser: web_response_parser
expected_effects:
- redirect_abused
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: Redirect users to attacker-controlled site. Chain with SSRF (redirect to
  internal), OAuth token theft (redirect_uri manipulation), or phishing.
hacktricks_ref: pentesting-web/server-side-inclusion-edge-side-inclusion-injection.md
