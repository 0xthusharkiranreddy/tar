name: graphql_enum
category: web
description: GraphQL introspection and exploitation
preconditions:
- service.port==80
parameters:
  target_ip: from_engagement.target_ip
command_template: "curl -s '{target_url}/graphql' -H 'Content-Type: application/json'\
  \ -d '{{\"query\":\"{{__schema{{types{{name fields{{name}}}}}}}}\"}}' \n"
parser: web_response_parser
expected_effects:
- graphql_enumerated
falsifier:
  pattern: error|failed|refused|denied
  timeout: 120
model_tier: haiku
mechanism: 'Introspection query reveals full schema. Look for: sensitive queries (users,
  admins), mutations (create/update/delete), subscription endpoints. Batching attacks
  for auth bypass.'
hacktricks_ref: network-services-pentesting/pentesting-web/graphql.md
