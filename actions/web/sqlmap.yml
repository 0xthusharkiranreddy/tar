name: sqlmap
category: web
description: Automated SQL injection detection and exploitation
preconditions:
- service.port==80
parameters:
  target_url: from_finding.url
command_template: sqlmap -u '{target_url}' --batch --risk 3 --level 5
parser: web_response_parser
expected_effects:
- sqli_confirmed
- database_dumped
falsifier:
  pattern: all tested parameters do not appear to be injectable
  timeout: 300
model_tier: haiku
mechanism: Tests GET/POST parameters for SQL injection. --batch auto-answers prompts.
  --risk 3 includes OR-based, --level 5 tests cookies/headers. Use --os-shell for
  command execution, --file-read for file access, --dump for data extraction.
hacktricks_ref: network-services-pentesting/pentesting-web/flask.md
