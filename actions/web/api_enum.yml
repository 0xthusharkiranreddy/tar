name: api_enum
category: web
description: REST API endpoint enumeration and testing
preconditions:
- service.port==80
parameters:
  target_url: from_engagement.target_url
command_template: ffuf -u {target_url}/api/FUZZ -w /usr/share/seclists/Discovery/Web-Content/api/api-endpoints.txt
  -mc all -fc 404
parser: null
expected_effects:
- api_endpoints_discovered
- api_docs_found
falsifier:
  pattern: 0 results
  timeout: 120
model_tier: haiku
mechanism: 'Enumerate API endpoints: /api/v1/, /swagger.json, /openapi.json, /graphql.
  Test IDOR (change user IDs), mass assignment (add admin=true to POST), broken auth
  (remove/modify JWT), rate limiting bypass. GraphQL: use introspection query for
  full schema.'
hacktricks_ref: network-services-pentesting/pentesting-smtp/README.md
