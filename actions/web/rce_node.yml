  timeout: 30
model_tier: haiku
mechanism: "Node.js RCE: eval() injection, require() injection, prototype pollution\
  \ \u2192 RCE, template injection (Pug/EJS/Nunjucks), deserialization (node-serialize)."
hacktricks_ref: generic-methodologies-and-resources/python/bypass-python-sandboxes/README.md
