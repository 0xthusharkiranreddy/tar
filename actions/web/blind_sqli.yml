name: blind_sqli
category: web
description: Blind SQL injection exploitation
preconditions:
- service.port==80
parameters:
  target_ip: from_engagement.target_ip
command_template: sqlmap -u '{target_url}' --technique=BT --batch
parser: web_response_parser
expected_effects:
- sqli_confirmed
- database_access
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: 'Boolean-based: different response for TRUE/FALSE. Time-based: SLEEP(5)
  for TRUE. Extract data char-by-char. sqlmap --technique=BT for boolean+time.'
hacktricks_ref: pentesting-web/ssrf-server-side-request-forgery/README.md
