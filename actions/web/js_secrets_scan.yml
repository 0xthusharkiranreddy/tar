name: js_secrets_scan
category: web
description: Download and grep all JS bundles for hardcoded API keys, tokens, passwords, endpoints, and source-map disclosures
mechanism: >
  Extracts all <script src=...> URLs from the target page using wget/curl, downloads
  each JS file, and runs pattern-matching for: API keys (aws, stripe, twilio, sendgrid,
  google patterns), JWT tokens (eyJ...), hardcoded passwords, internal endpoint paths,
  S3 bucket names, debug/staging environment flags, and source-map paths (.map files that
  leak original TypeScript/source). Also checks for exposed .env, .git/config, package.json
  disclosures. A human tester running Burp Suite or LinkFinder does this automatically;
  TAR now does too.
preconditions:
  - service.port in [80, 443, 8080, 8443, 8000, 3000, 5000]
parameters:
  url:
    description: Base URL of target web application
    required: true
command_template: >
  bash -c "
  TMPDIR=$(mktemp -d) &&
  curl -sk '{url}' | grep -oP '(?<=src=\")[^\"]+\.js[^\"]*' | head -20 | while read jsurl; do
    [[ \"$jsurl\" =~ ^http ]] || jsurl='{url}$jsurl';
    curl -sk \"$jsurl\" -o \"$TMPDIR/$(basename $jsurl .js).js\" 2>/dev/null;
  done &&
  grep -rEhi '(api[_-]?key|secret|token|password|passwd|auth|bearer|private[_-]?key|access[_-]?key|client[_-]?secret|aws_|AKIA|stripe_|twilio|sendgrid)\s*[=:]\s*[\"'\''`]([^\"'\''` ]{8,})[\"'\''` ]' $TMPDIR/ 2>/dev/null |
  head -30 &&
  grep -rEhi '(sourceMappingURL|//# sourceURL|/api/v[0-9]|localhost:[0-9]{4}|127\.0\.0\.1:[0-9]{4}|staging\.|dev\.|debug\s*=\s*true)' $TMPDIR/ 2>/dev/null | head -10 &&
  rm -rf $TMPDIR
  "
expected_effects:
  - js_secret_exposed
  - web_recon_done
falsifier: "No secrets found|grep.*no such file|curl.*could not resolve"
parser: web_response_parser
references:
  hacktricks: /pentesting-web/javascript-algorithms-and-source-code-review
  ocd_mindmap: "Web > Recon"
