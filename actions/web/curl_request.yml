name: curl_request
category: web
description: HTTP request to target web service for manual inspection or exploitation
preconditions:
  - service.port==80
parameters:
  target_ip: from_engagement.target_ip
  url: from_finding.url
command_template: "curl -s -k {url}"
parser: null
expected_effects:
  - web_response_obtained
  - potential_finding_discovered
falsifier:
  pattern: "Connection refused|couldn't connect"
  timeout: 30
model_tier: haiku
mechanism: "Direct HTTP request. Used for probing endpoints, downloading files, triggering SSRF/LFI, or interacting with APIs."
