name: template_engine_detect
category: web
description: Template engine detection for SSTI
preconditions:
- service.port==80
parameters:
  target_ip: from_engagement.target_ip
command_template: curl -s '{target_url}' -d '{parameter}=${{7*7}}'
parser: web_response_parser
expected_effects:
- template_engine_fingerprinted
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: 'Detection: {{7*7}}=49 (Jinja2/Twig), ${7*7}=49 (Freemarker/Velocity), #{7*7}=49 (Thymeleaf), {{=7*7}}=49 (Angular).
  Each engine has different RCE gadgets.'
hacktricks_ref: binary-exploitation/basic-stack-binary-exploitation-methodology/tools/pwntools.md
references:
  ocd_mindmap_node_ids:
  - 37e8774343
  - 61a3d002ab
  - 7b1d58ff2d
  - b5b12fca9c
