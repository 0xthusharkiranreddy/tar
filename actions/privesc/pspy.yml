name: pspy
category: privesc
description: Monitor processes without root using pspy
preconditions:
- os==linux
parameters:
  target_ip: from_engagement.target_ip
command_template: ./pspy64
parser: generic_parser
expected_effects:
- processes_monitored
- cron_found
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: Monitors /proc for new processes. Reveals cron jobs, service restarts,
  and scripts running as root that aren't visible in crontab. Upload via http.server.
hacktricks_ref: linux-hardening/privilege-escalation/README.md
