name: dll_hijack
category: privesc
description: DLL hijacking for privilege escalation
preconditions:
- os==windows
parameters:
  target_ip: from_engagement.target_ip
command_template: procmon.exe /quiet /minimized /backingfile capture.pml
parser: generic_parser
expected_effects:
- dll_hijacked
- system_shell
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: Monitor DLL load order with procmon. If service loads DLL from writable
  directory (or missing DLL), replace/create with malicious DLL. Common in custom
  applications.
hacktricks_ref: windows-hardening/windows-local-privilege-escalation/dll-hijacking/README.md
