name: suid_search
category: privesc
description: Find SUID binaries for privilege escalation
preconditions:
  - os==linux
parameters: {}
command_template: "find / -perm -4000 -type f 2>/dev/null"
parser: null
expected_effects:
  - suid_binaries_found
  - privesc_vector_found
falsifier:
  pattern: ""
  timeout: 30
model_tier: haiku
mechanism: "SUID binaries execute with owner's privileges (usually root). Custom or unusual SUID binaries are privesc candidates. Cross-reference with GTFOBins. Common targets: pkexec, base64, python, find, vim, nmap (old versions)."
