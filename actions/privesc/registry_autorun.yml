name: registry_autorun
category: privesc
description: Registry autorun exploitation
preconditions:
- os==windows
parameters:
  target_ip: from_engagement.target_ip
command_template: 'reg query HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\Run

  '
parser: generic_parser
expected_effects:
- autorun_abused
- system_shell
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: If autorun entry points to writable binary, replace for persistence/privesc.
  Check both HKLM (all users) and HKCU (current user) Run/RunOnce keys.
hacktricks_ref: windows-hardening/windows-local-privilege-escalation/dpapi-extracting-passwords.md
