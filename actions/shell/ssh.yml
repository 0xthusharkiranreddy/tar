name: ssh
category: shell
description: SSH login with credentials or key to obtain shell access
preconditions:
  - service.port==22
parameters:
  target_ip: from_engagement.target_ip
  username: from_cred.username
  password: from_cred.password
command_template: "ssh {username}@{target_ip}"
parser: null
expected_effects:
  - shell_obtained
  - phase_advance
falsifier:
  pattern: "Permission denied|Connection refused|No route to host"
  timeout: 30
model_tier: haiku
mechanism: "SSH authentication with password or key. On success, provides interactive shell. Check authorized_keys, id_rsa files for key-based auth."
