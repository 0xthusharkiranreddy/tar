name: struts_rce
category: cms
description: Apache Struts RCE
preconditions:
- service.port==80
parameters:
  target_ip: from_engagement.target_ip
command_template: python3 struts_exploit.py {target_url}
parser: web_response_parser
expected_effects:
- rce_achieved
- shell_obtained
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: 'At this point we have a ton of hints to look at Struts: There were a bunch
  of high profile vulnerabilities in Struts recently, several of which provide RCE:
  https://www.cvedetails.com/vulnerability-list/vendor_id-45/product_id-6117/Apache-Struts.html'
hacktricks_ref: generic-methodologies-and-resources/python/bypass-python-sandboxes/README.md
