name: magento_scan
category: cms
description: Magento vulnerability scanning
preconditions:
- service.port==80
parameters:
  target_ip: from_engagement.target_ip
command_template: python3 magescan {target_url}
parser: web_response_parser
expected_effects:
- rce_achieved
falsifier:
  pattern: error|failed|refused|denied
  timeout: 120
model_tier: haiku
mechanism: 'Magento: /downloader/ for Connect manager, admin panel path in database.
  Common vulns: Magento Shoplift (add admin), SQL injection in filters.'
hacktricks_ref: generic-methodologies-and-resources/basic-forensic-methodology/malware-analysis.md
