name: drupal_rce
category: cms
description: Drupal RCE (Drupalgeddon2/3)
preconditions:
- service.port==80
parameters:
  target_ip: from_engagement.target_ip
command_template: python3 drupalgeddon2.py {target_url}
parser: null
expected_effects:
- action_completed
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: 'Drupalgeddon2 (CVE-2018-7600): unauthenticated RCE via form rendering.
  Works on Drupal 7.x < 7.58 and 8.x < 8.5.1. drupalgeddon3 (CVE-2018-7602) similar.'
hacktricks_ref: network-services-pentesting/pentesting-web/drupal/drupal-rce.md
