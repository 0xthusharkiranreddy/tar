name: smb_null_session
category: smb
description: Attempt null session RPC enumeration via rpcclient
preconditions:
- service.port==445
parameters:
  target_ip: from_service.host_ip
command_template: rpcclient -U '' -N {target_ip} -c 'enumdomusers;enumdomgroups;getdompwinfo'
  2>&1
parser: smbclient_parser
parser_args: --tool enum4linux --host {target_ip}
expected_effects:
- has_users
falsifier:
  pattern: NT_STATUS_ACCESS_DENIED|NT_STATUS_LOGON_FAILURE|Could not connect
  timeout: 30
model_tier: haiku
mechanism: '**Mechanism**: Pre-Windows-2003 default allowed `IPC$` enumeration with
  empty username/password. Modern hardened DCs disable this; misconfigured SMB servers
  (NAS, printers) often allow.'
hacktricks_ref: generic-hacking/brute-force.md
