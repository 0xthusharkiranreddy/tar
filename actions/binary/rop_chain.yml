name: rop_chain
category: binary
description: ROP chain construction
preconditions:
- has_target
parameters:
  target_ip: from_engagement.target_ip
command_template: ROPgadget --binary {binary} --ropchain
parser: generic_parser
expected_effects:
- action_completed
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: Chain return-oriented programming gadgets to bypass NX+ASLR. ROPgadget
  and ropper find gadgets. pwntools automates chain building.
hacktricks_ref: binary-exploitation/rop-return-oriented-programing/README.md
