name: ghidra_decompile
category: binary
description: Binary decompilation with Ghidra
preconditions:
- has_target
parameters:
  target_ip: from_engagement.target_ip
command_template: ghidra_headless /tmp/project analysis -import {binary} -postScript
  DecompileAll.java
parser: generic_parser
expected_effects:
- action_completed
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: 'Headless Ghidra decompilation for reverse engineering. Analyze: main function,
  input handling, buffer sizes, format strings, use-after-free patterns.'
hacktricks_ref: generic-methodologies-and-resources/basic-forensic-methodology/malware-analysis.md
