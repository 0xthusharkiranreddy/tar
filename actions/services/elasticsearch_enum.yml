name: elasticsearch_enum
category: services
description: Elasticsearch enumeration
preconditions:
- service.port==9200
parameters:
  target_ip: from_engagement.target_ip
command_template: curl -s 'http://{target_ip}:9200/_cat/indices?v'
parser: generic_parser
expected_effects:
- elastic_access
- data_access
falsifier:
  pattern: error|failed|refused|denied
  timeout: 120
model_tier: haiku
mechanism: Elasticsearch often unauthenticated. /_cat/indices for index list, /_search
  for data, /_cluster/health for cluster info. Look for sensitive indices.
hacktricks_ref: network-services-pentesting/9200-pentesting-elasticsearch.md
