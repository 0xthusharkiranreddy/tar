name: cassandra_enum
category: services
description: Apache Cassandra enumeration
preconditions:
- service.port==9042
parameters:
  target_ip: from_engagement.target_ip
command_template: cqlsh {target_ip} -e 'DESCRIBE KEYSPACES;'
parser: generic_parser
expected_effects:
- cassandra_access
falsifier:
  pattern: error|failed|refused|denied
  timeout: 120
model_tier: haiku
mechanism: 'Cassandra often runs without auth. CQL queries similar to SQL. Check:
  system_auth.roles for credentials, other keyspaces for sensitive data.'
hacktricks_ref: network-services-pentesting/pentesting-smtp/README.md
