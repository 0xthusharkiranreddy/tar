name: oracle_enum
category: services
description: Oracle database enumeration
preconditions:
- service.port==1521
- has_cred
parameters:
  target_ip: from_engagement.target_ip
command_template: odat all -s {target_ip} -d {sid} -U {username} -P {password}
parser: generic_parser
expected_effects:
- action_completed
falsifier:
  pattern: error|failed|refused|denied
  timeout: 120
model_tier: haiku
mechanism: '* [Oracle SQL Default Databases](#oracle-sql-default-databases) * [Oracle
  SQL Comments](#oracle-sql-comments) * [Oracle SQL Enumeration](#oracle-sql-enumeration)
  * [Oracle SQL Database Credentials](#oracle-sql-database-credentials)'
hacktricks_ref: network-services-pentesting/pentesting-smtp/README.md
