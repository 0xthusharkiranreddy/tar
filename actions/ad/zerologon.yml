name: zerologon
category: ad
description: Zerologon (CVE-2020-1472)
preconditions:
- domain_joined
parameters:
  target_ip: from_engagement.target_ip
command_template: python3 cve-2020-1472-exploit.py {dc_name} {target_ip}
parser: generic_parser
expected_effects:
- zerologon_exploited
- domain_admin
falsifier:
