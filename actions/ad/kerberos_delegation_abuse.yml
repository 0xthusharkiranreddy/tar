name: kerberos_delegation_abuse
category: ad
description: Kerberos delegation full chain
preconditions:
- domain_joined
- has_cred
parameters:
  target_ip: from_engagement.target_ip
command_template: "# S4U2self \u2192 S4U2proxy \u2192 impersonate admin"
parser: impacket_parser
expected_effects:
- delegation_abused
- shell_obtained
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: 'Full delegation attack: (1) Get TGT for compromised service account, (2) S4U2self for ticket to self, (3) S4U2proxy
  to target SPN as impersonated user.'
