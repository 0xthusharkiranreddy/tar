name: kerberos_delegation_abuse
category: ad
description: Kerberos delegation full chain
preconditions:
- domain_joined
- has_cred
parameters:
  target_ip: from_engagement.target_ip
command_template: '# S4U2self → S4U2proxy → impersonate admin'
parser: null
expected_effects:
- action_completed
falsifier:
