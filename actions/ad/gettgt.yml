name: gettgt
category: ad
description: Request TGT with known credentials
preconditions:
- domain_joined
- has_cred
parameters:
  target_ip: from_engagement.target_ip
command_template: impacket-getTGT '{domain}/{username}:{password}' -dc-ip {target_ip}
parser: impacket_parser
expected_effects:
- tgt_obtained
- has_ticket
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: Requests Kerberos TGT. Useful for pass-the-ticket, S4U attacks, or when
  NTLM is blocked. Exports .ccache file.
hacktricks_ref: windows-hardening/active-directory-methodology/constrained-delegation.md
