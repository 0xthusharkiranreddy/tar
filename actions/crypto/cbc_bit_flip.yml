name: cbc_bit_flip
category: crypto
description: CBC bit-flipping attack
preconditions:
  - has_target
parameters:
  target_ip: from_engagement.target_ip
command_template: "python3 cbc_bitflip.py"
parser: null
expected_effects:
  - action_completed
falsifier:
  pattern: "error|failed|refused|denied"
  timeout: 30
model_tier: haiku
mechanism: "Flip bit in ciphertext block N to change corresponding bit in plaintext block N+1. Corrupts block N but precisely modifies N+1. Used to change 'admin=false' to 'admin=true'."
