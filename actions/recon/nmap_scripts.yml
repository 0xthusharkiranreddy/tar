name: nmap_scripts
category: recon
description: Version detection and default scripts on discovered open ports
preconditions:
- has_target
parameters:
  target_ip: from_engagement.target_ip
  ports: from_services.open_ports_csv
command_template: nmap -sCV -p {ports} -oX /tmp/nmap_sCV_{target_ip}.xml {target_ip}
parser: nmap_parser
parser_args: --format xml
expected_effects:
- service.product populated
- service.version populated
- service.scripts populated
falsifier:
  pattern: 0 hosts up
  timeout: 180
model_tier: haiku
mechanism: 'nmap -p22 <ip> -sC # Send default nmap scripts for SSH nmap -p22 <ip>
  -sV # Retrieve version nmap -p22 <ip> --script ssh2-enum-algos # Retrieve supported
  algorythms nmap -p22 <ip> --script ssh-hostkey --script-args ssh_hostkey=full #
  Retrieve weak ke'
hacktricks_ref: network-services-pentesting/pentesting-ssh.md
