name: sshuttle
category: pivoting
description: sshuttle VPN over SSH
preconditions:
- service.port==22
- has_cred
parameters:
  target_ip: from_engagement.target_ip
command_template: sshuttle -r {username}@{target_ip} {internal_network}/24
parser: generic_parser
expected_effects:
- action_completed
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: You can **tunnel** via **ssh** all the **traffic** to a **subnetwork**
  through a host.\ For example, forwarding all the traffic going to 10.10.10.0/24
  pip install sshuttle sshuttle -r user@host 10.10.10.10/24
hacktricks_ref: generic-hacking/tunneling-and-port-forwarding.md
