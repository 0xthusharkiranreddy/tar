name: double_pivot
category: pivoting
description: Double pivot through multiple hosts
preconditions:
- has_target
parameters:
  target_ip: from_engagement.target_ip
command_template: ssh -J {jump1_user}@{jump1_ip} {target_user}@{target_ip}
parser: generic_parser
expected_effects:
- pivot_established
falsifier:
  pattern: error|failed|refused|denied
  timeout: 30
model_tier: haiku
mechanism: "Multi-hop pivoting: SSH ProxyJump (-J) chains connections. Chisel: chain\
  \ client\u2192server through each hop. Ligolo: add agent on each pivot host."
hacktricks_ref: binary-exploitation/arbitrary-write-2-exec/aw2exec-__malloc_hook.md
